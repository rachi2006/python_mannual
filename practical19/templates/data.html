<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data File</title>
</head>
<body>
    <h1>Data File</h1>
    <table border="1">
        <tr>
            <th>name</th>
            <th>age</th>
            <th>email</th>
        </tr>
         {% for row in data %}
         <tr>
            <td>{{ row.name }}</td>
            <td>{{ row.age }}</td>
            <td>{{ row.email }}</td>
         </tr>
         {% endfor %}
    </table>
    
</body>
</html>
